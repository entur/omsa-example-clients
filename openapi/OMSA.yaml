    get:
      summary: Retrieve a single package
      operationId: getPackage
      tags: [collections]
      security:
        - BearerAuth: []
        - OAuth: []
      parameters:
        - $ref: "#/components/parameters/acceptLanguage"
        - $ref: "#/components/parameters/authorization"
        - name: packageId
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the package to retrieve

      responses:
        "200":
          $ref: "#/components/responses/packageResponse"
        "404":
          $ref: "#/components/responses/errorResponse"

  /:
    get:
      security:
        - OpenData: []
      tags:
        - discovery
      operationId: landingPage
      summary: Landing page
      description: >-
        Gives a (technical & human readable) output describing how this API must
        be used. If  the parameter f=html is supplied, a human readable page
        must be responded.
      externalDocs:
        url: https://app.swaggerhub.com/apis/OGC/ogcapi-features-1-example-1/1.0.1
      parameters:
        - $ref: "#/components/parameters/f"
        - $ref: "#/components/parameters/acceptLanguage"
      responses:
        "200":
          $ref: "#/components/responses/landingPageResponse"
        default:
          $ref: "#/components/responses/errorResponse"
  /api:
    get:
      description: This document
      parameters:
        - $ref: "#/components/parameters/f"
      responses:
        "200":
          description: General Success response.
          content:
            application/yaml:
              schema:
                type: string
        default:
          $ref: "#/components/responses/errorResponse"
      summary: This document
      security:
        - OpenData: []
      tags:
        - discovery
  /conformance:
    get:
      description: >-
        A list of all conformance classes specified in a standard that the
        server conforms to.
      parameters:
        - $ref: "#/components/parameters/f"
        - $ref: "#/components/parameters/acceptLanguage"
      operationId: getConformanceDeclaration
      responses:
        "200":
          $ref: "#/components/responses/conformanceDeclarationResponse"
        default:
