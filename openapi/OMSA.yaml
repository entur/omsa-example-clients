              links:
                type: array
                items:
                  $ref: "#/components/schemas/link"
        numberMatched:
          type: integer
        numberReturned:
          type: integer
        links:
          type: array
          description: actions that can be performed on this collection
          items:
            $ref: "#/components/schemas/link"

    refundOptionCollection:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          pattern: "^(RefundOptionCollection)$"
        options:
          type: array
          items:
            type: object
            properties:
              id:
                $ref: "#/components/schemas/normalString"
              properties:
                $ref: "#/components/schemas/refundOption"
              links:
                type: array
                items:
                  $ref: "#/components/schemas/link"
        numberMatched:
          type: integer
        numberReturned:
          type: integer
        links:
          type: array
          description:
            actions that can be performed on this package, but also alternative (rel=alternative+1, alternative+2) offers or references to other resources
            In case it is an alternative, specify clearly in the description what the financial consequences are.
          items:
            $ref: "#/components/schemas/link"

    travelDocumentCollection:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          pattern: "^(TravelDocumentCollection)$"
        travelDocuments:
          type: array
          items:
            type: object
            properties:
              id:
                $ref: "#/components/schemas/normalString"
              properties:
                oneOf:
                  - $ref: "#/components/schemas/externalTicket"
                  - $ref: "#/components/schemas/binaryTicket"
                discriminator:
                  propertyName: type
              links:
                type: array
                items:
                  $ref: "#/components/schemas/link"
        numberMatched:
          type: integer
        numberReturned:
          type: integer
        links:
          type: array
          description:
            actions that can be performed on this package, but also alternative (rel=alternative+1, alternative+2) offers or references to other resources
            In case it is an alternative, specify clearly in the description what the financial consequences are.
          items:
            $ref: "#/components/schemas/link"

    ancillary:
      allOf:
        - $ref: "#/components/schemas/ancillaryReference"
        - x-tm: ANCILLARY
          properties:
            type:
              type: string
              pattern: "^(ancillary)$"
            price:
              $ref: "#/components/schemas/amountOfMoney"
              description: "The additional cost of this ancillary if selected."
            description:
              type: string
              description: "A user-friendly description of the ancillary (e.g. 'Reserved seat for bike')."
            available:
              type: integer
              description: "Number of items available in stock (inventory). Useful for creating urgency in GUI."
            links:
              type: array
              items:
                $ref: "#/components/schemas/link"

    seat:
      type: object
      properties:
        type:
          type: string
          pattern: "^(seat)$"
        id:
          $ref: "#/components/schemas/externalReference"
        deck:
          $ref: "#/components/schemas/shortString"
        space:
          $ref: "#/components/schemas/shortString"
        row:
          $ref: "#/components/schemas/shortInt"
        seatNumber:
          $ref: "#/components/schemas/shortInt"
        facing:
          type: string
          enum: [FRONT, REAR, LEFT, RIGHT, OTHER]
        byWindow:
          type: boolean
        legSpace:
          description: in cm
          $ref: "#/components/schemas/shortInt"
        byAisle:
          type: boolean
        hasArmRest:
          type: boolean
        hasTray:
          type: boolean
        hasAirco:
          type: boolean
        hasEnergySupply:
          type: boolean
        hasLight:
          type: boolean

    asset:
      x-tm: VEHICLE, PARKING BAY, CYCLE STORAGE EQUIPMENT, VEHICLE CHARGING EQUIPMENT
      description: the asset that can by applied to execute a leg.
      properties:
        type:
          type: string
          pattern: "^(asset)$"
        id:
          $ref: "#/components/schemas/assetReference"
          description: Identifier of an asset. Can be an external reference, but also a (internal) ID
        visualId:
          $ref: "#/components/schemas/shortString"
          description: for instance, a license plate or seat number.

        product:
          $ref: "#/components/schemas/productReference"
        mode:
          $ref: "#/components/schemas/mode"
        subMode:
          $ref: "#/components/schemas/normalString"
          description:
            a more precise classification of the asset, like 'cargo bike', 'public bus', 'coach bus', 'office bus', 'water taxi',  'segway'.
            This is mandatory when using 'OTHER' as class.
        equipment:
          type: array
          description: list of external references
          maxItems: 100
          items:
            $ref: "#/components/schemas/equipmentReference"

    changeOption:
      type: object
      properties:
        type:
          type: string
          pattern: "^(change_option)$"
        id:
          type: string
        changeType:
          type: string
          enum:
            - REMOVE_TRAVELLER
            - ADD_TRAVELLER
            - UPDATE_TRAVELLER
            - ASSIGN_ASSET
            - REMOVE_ASSET
            - ASSIGN_ANCILLARY
            - REMOVE_ANCILLARY
            - CANCEL_PACKAGE
            - UPDATE_VALIDITY
            - UPDATE_TRAVEL_SPECIFICATION
        consequences:
          type: array
          items:
            $ref: "#/components/schemas/financialDetail"

    refundOption:
      type: object
      properties:
        type:
          type: string
          pattern: "^(refund_option)$"
        id:
          $ref: "#/components/schemas/uuid"
        packageState:
          $ref: "#/components/schemas/packageStatus"
        refundType:
          type: string
          enum: [PACKAGE_REFUND, REMOVE_TRAVELLER, REMOVE_ANCILLARY]
        consequences:
          type: array
          items:
            $ref: "#/components/schemas/financialDetail"

    country:
      type: string
      description: two-letter country codes according to ISO 3166-1
      maxLength: 2
      minLength: 2
      pattern: "[A-Z]{2}"

    currencyCode:
      type: string
      description: ISO 4217 currency code
      minLength: 3
      maxLength: 3
      pattern: "[a-zA-Z]{3}"

    customProperties:
      type: object
      description: dictionary for extra fields (bilatural agreements)
      additionalProperties:
        maxLength: 1000
        maxProperties: 20

    placeDefinitions:
      type: object
      properties:
        placeDefinitions:
          description: Places that are not specified in an external data source (like a home address)
          type: array
          minItems: 0
          maxItems: 3
          items:
            $ref: "#/components/schemas/postalAddress"

    binaryTicket:
      allOf:
        - $ref: "#/components/schemas/travelDocument"
        - x-tm: lacking
          description: Binary information, like a image or certificate
          type: object
          required:
            - contentType
            - base64
          properties:
            type:
              type: string
              pattern: "^(binary_ticket)$"
            contentType:
              description: the media type (IANA)
              type: string
            base64:
              $ref: "#/components/schemas/longString"
              description: base 64 binary data
            version:
              $ref: "#/components/schemas/tinyString"

    externalTicket:
      x-tm:
        - concept: TRAVEL DOCUMENT
      allOf:
        - $ref: "#/components/schemas/travelDocument"
        - type: object
          description: External ticket, can be accessed using the links collection, with rel=ticket
          properties:
            type:
              type: string

    financialDetail:
      type: object
      properties:
        amount:
          $ref: "#/components/schemas/amountOfMoney"
        package:
          $ref: "#/components/schemas/packageReference"
        offer:
          $ref: "#/components/schemas/offerReference"
        leg:
          $ref: "#/components/schemas/legReference"
        category:
          $ref: "#/components/schemas/paymentCategory"
        expirationDate:
          $ref: "#/components/schemas/dateTime"
        customFields:
          $ref: "#/components/schemas/customProperties"

    paymentCategory:
      type: string
      description: >-
        The category of the journalled item <br> _ALL_ - for filtering purposes
        only<br>

        <h2>TO initiated payments </h2> To request these payments, use the
        notifications, send a notification containing the payment
        confirmation.<br> _DEPOSIT_ - a deposit, to refund, use _REFUND_<br>
        _DAMAGE_ - extra costs that must be paid by the MP due to damage to the
        asset or ancillaries<br> _LOSS_ - extra costs that must be paid by the
        MP due to loss of asset or ancillaries<br> _STOLEN_ - the asset (and
        ancillaries) are stolen and should be paid for<br> _EXTRA_USAGE_ - the
        asset is paid for in advance, additional usage must be paid for (can
        also be a refund when used less! The amount should be negative in that
        case)<br> _FINE_ - a fine that arrived later on<br> _OTHER_ASSET_USED_ -
        additional costs for a replaced asset<br> _FARE_ - the normal costs of
        the purchased and executed leg(s)<br> _OTHER_ - unspecified<br>

        _CREDIT_ - generic CREDIT, e.g. for kick-backs <br> _VOUCHER_ - part of
        the fare that is covered by a voucher (no need to pay)<br> _REFUND_ -
        refund of the deposit or upfront paid fare<br> _REBATE_ - (partial)
        rebate of the fare<br> _REIMBURSEMENT_ - reimbursement of the fare<br>
      enum:
        [
          ALL,
          DAMAGE,
          LOSS,
          STOLEN,
          EXTRA_USAGE,
          REFUND,
          REBATE,
          REIMBURSEMENT,
          FINE,
          OTHER_ASSET_USED,
          CREDIT,
          VOUCHER,
          DEPOSIT,
          OTHER,
          FARE,
          FEE,
        ]

    # referenced data
    externalReference:
      $ref: "#/components/schemas/normalString"

    organisationReference:
      type: object
      required:
        - organisationId
      properties:
        organisationId:
          $ref: "#/components/schemas/normalString"
        name:
          $ref: "#/components/schemas/normalString"

    placeReference:
      type: object
      required:
        - placeId
      properties:
        placeId:
          type: string
          description:
            this string references to information that can be found in the `data sources`.
            Enlist all prefixes (=rel) from the /collections/datasources/items that apply to a place/location.
            Default it matches already with 'GPS' (no entry required in the datasources).
            In case of a custom place (like home address), you can use the 'P:' prefix and add the
            address to the **placeDefinitions** list of the request.
          maxLength: 200
          x-example-format: "^(GPS:|GBFS:stations:)"
          pattern: "^(GPS:|NSR:StopPlace:|P:)"
        name:
          $ref: "#/components/schemas/normalString"

    customerReference:
      $ref: "#/components/schemas/normalString"

    travellerReference:
      $ref: "#/components/schemas/normalString"

    userProfileReference:
      $ref: "#/components/schemas/normalString"

    productReference:
      type: object
      required:
        - productId
        - name
      properties:
        productId:
          $ref: "#/components/schemas/normalString"
        name:
          $ref: "#/components/schemas/normalString"

    offerReference:
      $ref: "#/components/schemas/normalString"

    packageReference:
      $ref: "#/components/schemas/normalString"

    legReference:
      $ref: "#/components/schemas/normalString"

    lineReference:
      $ref: "#/components/schemas/normalString"

    zoneReference:
      type: object
      required:
        - zoneId
      properties:
        zoneId:
          $ref: "#/components/schemas/normalString"
        name:
          $ref: "#/components/schemas/normalString"

    assetReference:
      $ref: "#/components/schemas/normalString"

    ancillaryReference:
      type: object
      required:
        - ancillaryId
      properties:
        ancillaryId:
          $ref: "#/components/schemas/normalString"
        name:
          $ref: "#/components/schemas/normalString"

    equipmentReference:
      type: object
      required:
        - equipmentId
      properties:
        equipmentId:
          $ref: "#/components/schemas/normalString"
        name:
          $ref: "#/components/schemas/normalString"

    serviceJourneyReference:
      $ref: "#/components/schemas/normalString"

    userNeedReference:
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/normalString"
        name:
          $ref: "#/components/schemas/normalString"

    # base types
    error:
      type: object
      additionalProperties: false
      description: JSON schema for exceptions based on RFC 7807
      required:
        - errorcode
        - title
      properties:
        errorcode:
          $ref: "#/components/schemas/tinyInt"
          description: >-
            The specific error code
        type:
          $ref: "#/components/schemas/tinyString"
          description: The category of this type of error.
        title:
          $ref: "#/components/schemas/shortString"
          description: >-
            A short, human-readable summary of the problem type.  It SHOULD NOT
            change from occurrence to occurrence of the problem, except to match
            Content-Language
        status:
          $ref: "#/components/schemas/tinyInt"
          description: >-
            The HTTP status code ([RFC7231], Section 6) generated by the origin
            server for this occurrence of the problem.
        detail:
          $ref: "#/components/schemas/longString"
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem, matches Content-Language
        instance:
          $ref: "#/components/schemas/url"
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.  It may or may not yield further information if
            dereferenced.
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"

    landingPage:
      type: object
      required:
        - links
      properties:
        title:
          type: string
          example: Example processing server
        description:
          type: string
          example: Example server implementing the OGC API - Processes 1.0 Standard
        attribution:
          type: string
          title: attribution for the Processes API
          description: The `attribution` should be short and intended for presentation to a user, for example, in a corner of a map. Parts of the text can be links to other resources if additional information is needed. The string can include HTML markup.
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"

    collections:
      type: object
      required:
        - links
        - collections
      properties:
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"
        timeStamp:
          type: string
          format: date-time
        numberMatched:
          type: integer
          minimum: 0
          example: 1
        numberReturned:
          type: integer
          minimum: 0
          example: 1
        collections:
          type: array
          items:
            $ref: "#/components/schemas/collectionInfo"

    collectionInfo:
      type: object
      required:
        - id
        - links
      properties:
        id:
          type: string
          description: identifier of the collection used, for example, in URIs
          example: dem
        title:
          type: string
          description: human readable title of the collection
          example: Digital Elevation Model
        description:
          type: string
          description: a description of the data in the collection
          example: A Digital Elevation Model.
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"
        extent:
          externalDocs:
            url: "https://raw.githubusercontent.com/opengeospatial/ogcapi-processes/refs/heads/master/openapi/schemas/common-geodata/extent-uad.yaml"
          type: object
        itemType:
          description: indicator about the type of the items in the collection if the collection has an accessible /collections/{collectionId}/items endpoint
          type: string
          default: unknown
        crs:
          description: the list of coordinate reference systems supported by the API; the first item is the default coordinate reference system
          type: array
          items:
            type: string
          default:
            - http://www.opengis.net/def/crs/OGC/1.3/CRS84
          example:
            - http://www.opengis.net/def/crs/OGC/1.3/CRS84
            - http://www.opengis.net/def/crs/EPSG/0/4326
        dataType:
          $ref: "#/components/schemas/dataType"
        geometryDimension:
          description: "The geometry dimension of the features shown in this layer (0: points, 1: curves, 2: surfaces, 3: solids), unspecified: mixed or unknown"
          type: integer
          minimum: 0
          maximum: 3
        minScaleDenominator:
          description: Minimum scale denominator for usage of the collection
          type: number
        maxScaleDenominator:
          description: Maximum scale denominator for usage of the collection
          type: number
        minCellSize:
          description: Minimum cell size for usage of the collection
          type: number
        maxCellSize:
          description: Maximum cell size for usage of the collection
          type: number

    dataType:
      oneOf:
        - type: string
        - type: string
          enum:
            - map
            - vector
            - coverage

    processList:
      type: object
      required:
        - processes
        - links
      properties:
        processes:
          type: array
          items:
            $ref: "#/components/schemas/processSummary"
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"

    processSummary:
      allOf:
        - $ref: "#/components/schemas/descriptionType"
        - type: object
          required:
            - id
            - version
          properties:
            id:
              type: string
            version:
              type: string
            jobControlOptions:
              type: array
              items:
                $ref: "#/components/schemas/jobControlOptions"
            links:
              type: array
              items:
                $ref: "#/components/schemas/link"

    jobControlOptions:
      type: string
      enum:
        - sync-execute
        - async-execute
        - dismiss

    descriptionType:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        keywords:
          type: array
          items:
            type: string
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/metadata"

    metadata:
      oneOf:
        - allOf:
            - $ref: "#/components/schemas/link"
            - type: object
              properties:
                role:
                  type: string
        - type: object
          properties:
            role:
              type: string
            title:
              type: string
            lang:
              type: string
            value:
              oneOf:
                - type: string
                - type: object
    link:
      type: object
      additionalProperties: false
      x-externalDocs:
        url: https://github.com/opengeospatial/ogcapi-processes/raw/refs/heads/master/openapi/schemas/common-core/link.yaml
      required:
        - href
        - rel
      properties:
        rel:
          type: string
          description: >-
            the action that can be performed OR part of the URI allowed values
            include the 'processId's, prefixes for the referenced data sources,
            prefixes for deeplinks ('apple' and 'android'), OGC compliant ones
            (alternative, next, etc)
        href:
          $ref: "#/components/schemas/url"
        type:
          $ref: "#/components/schemas/shortString"
          description: allowed values are described by IANA, ("application/geo+json")
        method:
          type: string
          description: to indicate the http method.
          enum:
            - POST
            - GET
            - PUT
            - DELETE
            - PATCH
        description:
          type: string
          description: the description of the external data source
        body:
          type: object
          description: the (prefilled) body for the request
        headers:
          type: object
          additionalProperties:
            type: string
        isMandatory:
          description: is this link informative, or must it be used?
          type: boolean
        hash:
          description: to validate that the content of the link hasn't been changed.
          type: string
        validity:
          $ref: "#/components/schemas/temporalParameter"

    date:
      type: string
      format: full-date
      x-pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
      description: >-
        https://www.rfc-editor.org/rfc/rfc3339#section-5.6, full-date
        (2019-10-12)
    dateTime:
      type: string
      format: date-time
      x-pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$
      description: >-
        https://www.rfc-editor.org/rfc/rfc3339#section-5.6, date-time
        (2019-10-12T07:20:50.52Z)
    day:
      x-tm: DAY OF WEEK
      type: string
      enum: [MON, TUE, WED, THU, FRI, SAT, SUN]
    float:
      type: number
      description: the travelled distance. Only if applicable.
      format: float
      minimum: 0
    httpDate:
      type: string
      description: A HTTP date string
      x-format: http-date
      x-externalDocs:
        url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Expires
        description: http-date
    longInt:
      type: integer
      description: long number, for distances etc. (>1.000)
      default: 0
      minimum: 0
    longString:
      type: string
      description: long string, memos etc (length 0-10.000)
      maxLength: 10000
    normalInt:
      type: integer
      description: default length for an integer (0-1000)
      default: 0
      minimum: 0
      maximum: 1000
    normalString:
      type: string
      description: default string, full names etc (length 0-200)
      maxLength: 200
    shortInt:
      type: integer
      description: a bit short integer (0-100)
      default: 0
      minimum: 0
      maximum: 100
    shortString:
      type: string
      description: short string, display names (length 0-75)
      maxLength: 75
    tinyInt:
      type: integer
      description: for really small numbers (0-10)
      default: 0
      minimum: 0
      maximum: 10
    tinyString:
      type: string
      description: real short string, codes (length 0-10)
      maxLength: 10
    url:
      type: string
      description: valid URL
      format: uri
    uuid:
      type: string
      x-preferred-pattern: >-
        ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
      description: >-
        https://en.wikipedia.org/wiki/Universally_unique_identifier see also
        https://www.ietf.org/rfc/rfc4122.txt
        (ae76f51c-a1a6-46af-b9ab-8233564adcae)

  parameters:
    f:
      description: >-
        The optional f parameter indicates the output format that the server
        shall provide as part of the response document.  The default format is
        JSON.
      explode: false
      in: query
      name: f
      required: false
      schema:
        default: json
        enum:
          - json
          - html
        type: string
      style: form
    packageId:
      in: query
      name: packageId
      schema:
        type: string
      required: true
      description: the identifier of a package
    optionalPackageId:
      in: query
      name: packageId
      schema:
        type: string
      required: false
      description: the identifier of a package
    acceptLanguage:
      in: header
      name: Accept-Language
      required: true
      schema:
        $ref: "#/components/schemas/shortString"
      x-externalDocs:
        description: >-
          A comma-separated list of BCP 47 (RFC 5646) language tags and optional
          weights as described in IETF RFC7231 section 5.3.5. A list of the
          languages/localizations the user would like to see the results in.
          For user privacy and ease of use on the TO side, this list should be
          kept as short as possible
    authorization:
      in: header
      name: authorization
      required: true
      schema:
        type: string
      description: Header field, JWT must be supplied
    legId:
      in: query
      name: legId
      description: leg identifier
      required: true
      schema:
        $ref: "#/components/schemas/legReference"
    optionalLegId:
      in: query
      name: legId
      description: leg identifier
      required: false
      schema:
        $ref: "#/components/schemas/legReference"
    optionalTravellerId:
      in: query
      name: travellerId
      description: traveller identifier
      required: false
      schema:
        $ref: "#/components/schemas/travellerReference"
    optionalAncillaryId:
      in: query
      name: ancillaryId
      description: ancillary identifier
      required: false
      schema:
        $ref: "#/components/schemas/externalReference"
    optionalProductId:
      in: query
      name: productId
      description: Product identifier
      required: false
      schema:
        $ref: "#/components/schemas/normalString"
    productId:
      in: query
      name: productId
      description: Product identifier
      required: true
      schema:
        $ref: "#/components/schemas/normalString"
    limit:
      name: limit
      in: query
      description: >-
        The optional limit parameter limits the number of items that are
        presented in the response document.

        Only items are counted that are on the first level of the collection in
        the response document.

        Nested objects contained within the explicitly requested items shall not
        be counted.
        Minimum = 1. Maximum = 10000. Default = 100.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 100
      style: form
      explode: false
    offset:
      name: offset
      in: query
      description: >-
        The optional offset parameter representing the starting index of the
        returned collection.

        Only items are counted that are on the first level of the collection in
        the response document.

        Nested objects contained within the explicitly requested items shall not
        be counted.

        Default = 0.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      style: form
      explode: false
    bbox:
      name: bbox
      in: query
      description: >-
        Only features that have a geometry that intersects the bounding box are
        selected.
        The bounding box is provided as four or six numbers, depending on
        whether the coordinate reference system includes a vertical axis (height or depth):
        * Lower left corner, coordinate axis 1
        * Lower left corner, coordinate axis 2
        * Minimum value, coordinate axis 3 (optional)
        * Upper right corner, coordinate axis 1
        * Upper right corner, coordinate axis 2
        * Maximum value, coordinate axis 3 (optional)

        If the value consists of four numbers, the coordinate reference system
        is WGS 84 longitude/latitude (http://www.opengis.net/def/crs/OGC/1.3/CRS84)

        unless a different coordinate reference system is specified in the
        parameter `bbox-crs`.

        If the value consists of six numbers, the coordinate reference system is
        WGS 84 longitude/latitude/ellipsoidal height (http://www.opengis.net/def/crs/OGC/0/CRS84h)
        unless a different coordinate reference system is specified in the
        parameter `bbox-crs`.

        The query parameter `bbox-crs` is specified in OGC API - Features - Part
        2: Coordinate Reference Systems by Reference.

        For WGS 84 longitude/latitude the values are in most cases the sequence
        of minimum longitude, minimum latitude, maximum longitude and maximum
        latitude.

        However, in cases where the box spans the antimeridian the first value
        (west-most box edge) is larger than the third value (east-most box
        edge).

        If the vertical axis is included, the third and the sixth number are
        the bottom and the top of the 3-dimensional bounding box.

        If a feature has multiple spatial geometry properties, it is the
        decision of the server whether only a single spatial geometry property is used to
        determine the extent or all relevant geometries.
      required: false
      schema:
        type: array
        items:
          type: number
      style: form
      explode: false
  headers:
    contentLanguage:
      description: >-
        The language/localization of user-facing content, One IETF BCP 47 (RFC
        5646) language tag (nl-NL)
      schema:
        type: string
        pattern: ^[a-zA-Z]+-[a-zA-Z]+$
      required: true
    expires:
      description: this field MUST be there whenever the package hasn't been purchased.
      schema:
        $ref: "#/components/schemas/httpDate"
      required: false
    version:
      description: the version used to format the response
      schema:
        type: string
      required: true
    digest:
      description: the hash of the body, SHA-256 ("SHA-256=3q2+7w==:")
      schema:
        type: string
      required: false
    publicKey:
      description: >-
        the public key of the sending party, can be used to validate the signed
        digest (it should deliver the digest)
      x-example: >-
        {"certificate": "-----BEGIN
        CERTIFICATE-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAnZ5...\n-----END
        CERTIFICATE-----"}
      schema:
        type: string
      required: false
    signedDigest:
      description: >-
        the signed hash of the offer (or package), using the private key,
        SHA-256 base64 encoded
      schema:
        type: string
      required: false
  securitySchemes:
    OpenData:
      type: http
      description: >-
        this data set is open. If it is one of the options, it is up to the
        implementing party whether it is open or not.
      scheme: none
    BearerAuth:
      type: http
      description: >-
        This authentication is the basic one. If you have obtained a JWT
        (somewhere), you can use this token to identify you at endpoints.
      scheme: bearer
      bearerFormat: JWT
    OAuth:
      type: oauth2
      description: >-
        This flow facilitates to get access tokens based on username/password.
        These can be obtained by the owner of the service, look at the landing
        page to find out how to contact it.
      flows:
        authorizationCode:
          authorizationUrl: /
          tokenUrl: /oauth/token
          scopes:
            processes: Access to /processes/
    OAuthPKI:
      type: oauth2
      description: >-
        OAuth 2.0 with PKI and mutual TLS for client authentication The client
        sends its X.509 during the handshake. The server validates and accepts
        the certificate. The call to the /oauth/token can use the provided
        credentials (O or CN) to provide a access_token (JWT).
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes:
            processes: Access to /processes/
