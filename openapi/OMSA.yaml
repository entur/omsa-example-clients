      tags:
        - discovery
  /collections:
    get:
      security:
        - OpenData: []
      tags:
        - discovery
      summary: the feature collections in the dataset
      description: >-
        returns a collection of available collection (like offers, packages,
        legs, support-requests and payments)
      operationId: getCollections
      responses:
        "200":
          description: A list of available collections
          headers:
            Content-Language:
              $ref: "#/components/headers/contentLanguage"
            Version:
              $ref: "#/components/headers/version"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/collections"
        default:
          $ref: "#/components/responses/errorResponse"
  /collections/{collectionId}:
    get:
      security:
        - OpenData: []
      tags:
        - discovery
      summary: describe the feature collection with id `collectionId`
      operationId: describeCollection
      description: a (machine or human) readable description of this collection
      parameters:
        - name: collectionId
          in: path
          description: local identifier of a collection
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/acceptLanguage"
      responses:
        "200":
          description: description of data delivered by this collection
          headers:
            Content-Language:
              $ref: "#/components/headers/contentLanguage"
            Version:
              $ref: "#/components/headers/version"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/collectionInfo"
            text/html:
              schema:
                type: string
        default:
          $ref: "#/components/responses/errorResponse"
  /processes:
    get:
      security:
        - OpenData: []
      tags:
        - discovery
      summary: retrieve the list of available processes
      description: >
        The list of processes contains a summary of each process the OGC API -
        Processes offers, including the link to a more detailed description of
        the process.


        For more information, see [Section
        7.9](https://docs.ogc.org/is/18-062/18-062.html#sc_process_list).
      parameters:
        - $ref: "#/components/parameters/acceptLanguage"
      operationId: getProcesses
      responses:
        "200":
          description: Information about the available processes
          headers:
            Version:
              $ref: "#/components/headers/version"
            Content-Language:
              $ref: "#/components/headers/contentLanguage"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/processList"
        default:
          $ref: "#/components/responses/errorResponse"
  /processes/{processID}:
    get:
      security:
        - OpenData: []
      tags:
        - discovery
      summary: retrieve a process description
      description: >
        The process description contains information about inputs and outputs
        and a link to the execution-endpoint for the process. The Core does not
        mandate the use of a specific process description to specify the
        interface of a process. That said, the Core requirements class makes the
        following recommendation:
        Implementations SHOULD consider supporting the OGC process description.
        For more information, see [Section 7.10](https://docs.ogc.org/is/18-062/18-062.html#sc_process_description).
      operationId: getProcessDescription
      parameters:
        - $ref: "#/components/parameters/acceptLanguage"
        - name: processID
          in: path
          required: true
          schema:
            type: string
            enum:
              - search-offers
              - add-traveller
              - remove-traveller
              - update-traveller
              - assign-asset
              - assign-ancillary
              - purchase-offer
              - 2-phase-purchase-offer
              - confirm-offer
              - release-offer
              - purchase-package
              - extend-expiry-time
              - cancel-package
      responses:
        "200":
          description: A process description.
          headers:
            Content-Language:
              $ref: "#/components/headers/contentLanguage"
            Version:
              $ref: "#/components/headers/version"
          content:
            application/json:
              schema:
                type: object
                externalDocs:
                  url: "https://raw.githubusercontent.com/opengeospatial/ogcapi-processes/refs/heads/master/openapi/schemas/processes-core/process.yaml"
        default:
          $ref: "#/components/responses/errorResponse"

  /oauth/token:
    post:
      summary: "Token Endpoint"
      description:
        This endpoint is used to obtain an access token and optionally an ID token
        through different OAuth 2.0 grant types, including Client Credentials Flow.
        Whenever the mTLS flow is taken, the properties will be ignored, and the access token
        will be generated based on the credentials in the certificate (O or CN).
      tags:
        - authentication
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials, password, refresh_token]
                  description: "The grant type: 'client_credentials', 'password', or 'refresh_token'."
                  default: client_credentials
                username:
                  type: string
                  description: "The username"
                password:
                  type: string
                  description: "The password"
                client_id:
                  type: string
                  description: "The client ID (Client Credentials Flow)"
                client_secret:
                  type: string
                  description: "The client secret (Client Credentials Flow)"
      responses:
        "200":
          description: "Successful token issuance."
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: "The issued access token."
                  refresh_token:
                    type: string
                    description: "The optional refresh token."
                  token_type:
                    type: string
                    description: "The type of the token."
                    default: "Bearer"
                  expires_in:
                    type: integer
                    description: "The lifetime of the access token in seconds."
        "400":
          description: "Bad Request: Invalid request or wrong grant type."
        "401":
          description: "Unauthorized: Invalid client ID or secret."
        "500":
          description: "Internal Server Error: Something went wrong."
components:
  responses:
    errorResponse:
      description: >-
        Bad request.
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                maxItems: 10
                items:
                  $ref: "#/components/schemas/error"

    landingPageResponse:
      description: The reponse containing a landing page
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/landingPage"
        text/html:
          schema:
            type: string

    conformanceDeclarationResponse:
      description: |-
        The URIs of all conformance classes supported by the server.

        To support "generic" clients that want to access multiple
        OGC API Features implementations - and not "just" a specific
        API / server, the server declares the conformance
        classes it implements and conforms to.
      headers:
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Version:
          $ref: "#/components/headers/version"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/confClasses"
        text/html:
          schema:
            type: string

    geojsonResponse:
      description: a geojson response
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/geojson"

    changeOptionsResponse:
      description: a response with change options
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/changeOptionCollection"

    refundOptionsResponse:
      description: a response with refund options
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/refundOptionCollection"

    travelDocumentResponse:
      description: a response to obtain travel document (references)
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/travelDocumentCollection"

    dataSourceResponse:
      description: a list of datasources
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/link"

    ancillariesResponse:
      description: a ancillaries response
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: true
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ancillaryCollection"

    searchOfferResponse:
      description: a search offer response
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/offerCollection"

    packageResponse:
      description:
        a geojson response, containing the package details in the main properties
        and the legs are represented in the features
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/package"

    packageCollectionResponse:
      description: A list of packages
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/packageCollection"

    offerResponse:
      description: a geojson response
      headers:
        Version:
          $ref: "#/components/headers/version"
        Content-Language:
          $ref: "#/components/headers/contentLanguage"
        Expires:
          schema:
            $ref: "#/components/schemas/httpDate"
          required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/geojson"
  schemas:
    # OGC
    subscriber:
      type: object
      externalDocs:
        url: https://github.com/opengeospatial/ogcapi-processes/raw/refs/heads/master/openapi/schemas/processes-core/subscriber.yaml
      description: |-
        Optional URIs for callbacks for this job.

        Support for this parameter is not required and the parameter may be
        removed from the API definition, if conformance class **'callback'**
        is not listed in the conformance declaration under `/conformance`.
      required:
        - successUrl
      properties:
        successUri:
          type: string
          format: uri
        inProgressUri:
          type: string
          format: uri
        failedUri:
          type: string
          format: uri

    confClasses:
      type: object
      required:
        - conformsTo
      properties:
        conformsTo:
          type: array
          items:
            type: string
            example: "http://www.opengis.net/spec/ogcapi-processes-1/1.0/conf/core"

    # Inputs
    searchOfferInput:
      type: object
      required:
        - type
      description: A package planning request, resulting in package options
      anyOf:
        - required: [travellers]
        - required: [profiles]
      properties:
        type:
          type: string
          pattern: "^(search_offer)"
        timestamp:
          description: timestamp of request
          $ref: "#/components/schemas/dateTime"
        specification:
          allOf:
            - $ref: "#/components/schemas/travelSpecification"
            - $ref: "#/components/schemas/placeDefinitions"
        pattern:
          $ref: "#/components/schemas/tripPattern"
        packageToExchange:
          $ref: "#/components/schemas/packageReference"
        travellers:
          type: array
          maxItems: 10
          minItems: 1
          items:
            $ref: "#/components/schemas/individualTraveller"
        profiles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/userProfile"
        travellingAssets:
          type: array
          items:
            $ref: "#/components/schemas/travellingAsset"

    selectOffersInput:
      type: object
      required:
        - type
        - selections
      properties:
        selections:
          type: array
          description: "Component-based selection of offers and their ancillaries."
          items:
            type: object
            required:
              - offerId
            properties:
              offerId:
                $ref: "#/components/schemas/offerReference"
              selectedAncillaryIds:
                type: array
                description: "List of ancillaryIds to include specifically for this offer instance."
                items:
                  $ref: "#/components/schemas/ancillaryReference"
        type:
          type: string
          pattern: "^(select_offers)"
        timestamp:
          description: timestamp of request
          $ref: "#/components/schemas/dateTime"

    packageInput:
      type: object
      required:
        - type
        - packageId
      properties:
        packageId:
          $ref: "#/components/schemas/packageReference"
        type:
          type: string
          pattern: "^(package)"
        timestamp:
          description: timestamp of request
          $ref: "#/components/schemas/dateTime"

    legInput:
      allOf:
        - $ref: "#/components/schemas/packageInput"
        - type: object
          required:
            - legId
            - type
          properties:
            offerId:
              $ref: "#/components/schemas/offerReference"
            legId:
              $ref: "#/components/schemas/legReference"
            type:
              type: string
              pattern: "^(leg)"
            location:
              $ref: "#/components/schemas/placeReference"
            #evidence:
            #   type: array
            #   minItems: 1
            #   items:
            #     $ref: "#/components/schemas/link"

    refundOptionInput:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          pattern: "^(claim_refund_option|confirm_refund_option)$"
        optionId:
          $ref: "#/components/schemas/uuid"

    addTravellerInput:
      type: object
      required:
        - type
        - packageId
      properties:
        type:
          type: string
          pattern: "^(traveller)$"
        packageId:
          $ref: "#/components/schemas/packageReference"
        individualTraveller:
          $ref: "#/components/schemas/individualTraveller"
        userProfile:
          $ref: "#/components/schemas/userProfile"
        travellingAsset:
          $ref: "#/components/schemas/travellingAsset"

    removeTravellerInput:
      type: object
      required:
        - type
        - packageId
        - travellerId
      properties:
        type:
          type: string
          pattern: "^(traveller)$"
        travellerId:
          $ref: "#/components/schemas/travellerReference"
        packageId:
          $ref: "#/components/schemas/packageReference"

    updateTravellerInput:
      type: object
      required:
        - type
        - packageId
        - travellerId
      properties:
        type:
          type: string
          pattern: "^(traveller)$"
        packageId:
          $ref: "#/components/schemas/packageReference"
        travellerId:
          $ref: "#/components/schemas/travellerReference"
        individualTraveller:
          $ref: "#/components/schemas/individualTraveller"
        userProfile:
          $ref: "#/components/schemas/userProfile"
        travellingAsset:
          $ref: "#/components/schemas/travellingAsset"

    assetInput:
      allOf:
        - $ref: "#/components/schemas/legInput"
        - type: object
          required:
            - type
            - assetId
          properties:
            type:
              type: string
              pattern: "^(asset)$"
            assetId:
              $ref: "#/components/schemas/assetReference"
            replaceAssetId:
              $ref: "#/components/schemas/assetReference"

    ancillaryInput:
      allOf:
        - $ref: "#/components/schemas/legInput"
        - type: object
          required:
            - type
            - ancillaryId
          properties:
            type:
              type: string
              pattern: "^(ancillary)$"
            ancillaryId:
              $ref: "#/components/schemas/ancillaryReference"
            replaceAncillaryId:
              $ref: "#/components/schemas/ancillaryReference"

    purchaseOffersInput:
      allOf:
        - $ref: "#/components/schemas/selectOffersInput"
        - type: object
          required:
            - type
          properties:
            type:
              type: string
              pattern: "^(purchase_offers)$"

    extendExpiryTimeInput:
      allOf:
        - $ref: "#/components/schemas/packageInput"
        - type: object
          required:
            - type
          properties:
            type:
              type: string
              pattern: "^(extend_expiry_time)$"

            extensionReason:
              type: string
              description:
                in case operation is EXTEND_EXPIRY_TIME, the reason for extension must be supplied here.<br>
                _PURCHASE_PENDING_ - The internal purchase process on the MP side is not yet finished<br>
                _PAYMENT_PENDING_ - The customer is in the payment process<br>
                _OTHER_ - unspecified
              pattern: "^(purchase_pending|payment_pending|other)$"

    # GeoJSON specs, in contradiction to the convention starting with a capital. Reason: compatibility with GeoJSON specification (types are named this way)
    basePoint:
      type: array
      minItems: 2
      maxItems: 2
      items:
        type: number
        format: float
        minimum: 0.0

    geojsonPoint:
      type: object
      description: Geojson Coordinate
      required:
        - coordinates
      properties:
        coordinates:
          $ref: "#/components/schemas/basePoint"

    geojsonLine:
      type: object
      description: An array of WGS84 coordinate pairs
      required:
        - coordinates
      properties:
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/basePoint"

    geojsonPolygon:
      type: object
      description: geojson representation of a polygon. First and last point must be equal. See also https://geojson.org/geojson-spec.html#polygon and example https://geojson.org/geojson-spec.html#id4. The order should be lon, lat [[[lon1, lat1], [lon2,lat2], [lon3,lat3], [lon1,lat1]]], the first point should match the last point.
      required:
        - coordinates
      properties:
        coordinates:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/basePoint"

    geojsonMultiPolygon:
      type: object
      description: geojson representation of a multi polygon. See also https://geojson.org/geojson-spec.html#multipolygon
      required:
        - coordinates
      properties:
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                $ref: "#/components/schemas/basePoint"

    geojsonFeature:
      type: object
      required:
        - id
        - type
        - properties
      properties:
        type:
          type: string
          pattern: "^(Feature)$"
        geometry:
          oneOf:
            - $ref: "#/components/schemas/geojsonPoint"
            - $ref: "#/components/schemas/geojsonLine"
            - $ref: "#/components/schemas/geojsonPolygon"
            - $ref: "#/components/schemas/geojsonMultiPolygon"
        properties:
          oneOf:
            - $ref: "#/components/schemas/asset"
            - $ref: "#/components/schemas/seat"
        id:
          $ref: "#/components/schemas/shortString"
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"

    geojson:
      type: object
      properties:
        type:
          type: string
          pattern: "^(FeatureCollection)$"
        features:
          type: array
          items:
            $ref: "#/components/schemas/geojsonFeature"
        properties:
          type: object
        crs:
          type: object
          properties:
            type:
              type: string
            properties:
              type: object
              properties:
                name:
                  type: string
        numberMatched:
          type: integer
        numberReturned:
          type: integer
        links:
          type: array
          description:
            actions that can be performed on this package, but also alternative (rel=alternative+1, alternative+2) offers or references to other resources
            In case it is an alternative, specify clearly in the description what the financial consequences are.
          items:
            $ref: "#/components/schemas/link"

    offerCollection:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          pattern: "^(OfferCollection)$"
        offers:
          type: array
          items:
            $ref: "#/components/schemas/offer"
        numberMatched:
          type: integer
        numberReturned:
          type: integer
        links:
          type: array
          description:
            actions that can be performed on this package, but also alternative (rel=alternative+1, alternative+2) offers or references to other resources
            In case it is an alternative, specify clearly in the description what the financial consequences are.
          items:
            $ref: "#/components/schemas/link"

    packageCollection:
      type: object
      required:
        - type
        - packages
      properties:
        type:
          type: string
          enum: ["PackageCollection"]
        packages:
          type: array
          items:
            $ref: "#/components/schemas/package"
        numberMatched:
          type: integer
          description: Total number of packages available (for pagination)
        numberReturned:
          type: integer
          description: Number of packages in this response
        links:
          type: array
          description: Actions that can be performed on this collection.
          items:
            $ref: "#/components/schemas/link"

    # Major Transmodel objects
    package:
      x-tm: TRAVEL OFFER PACKAGE, CUSTOMER PURCHASE PACKAGE
      allOf:
        - $ref: "#/components/schemas/travelSpecification"
        - $ref: "#/components/schemas/placeDefinitions"
        - type: object
          description:
            a purchased package is a registration of an agreement between end user and TO,
            to execute a package (=set of legs) according a specification, including all conditions
          required:
            - type
            - status
            - price
            - offers
          properties:
            type:
              type: string
              pattern: "^(package)$"
            id:
              type: string
            status:
              $ref: "#/components/schemas/packageStatus"
            price:
              $ref: "#/components/schemas/amountOfMoney"
            offers:
              type: array
              items:
                $ref: "#/components/schemas/offer"
            guarantees:
              type: array
              items:
                $ref: "#/components/schemas/externalReference"
            travellers:
              type: array
              items:
                oneOf:
                  - $ref: "#/components/schemas/individualTraveller"
                  - $ref: "#/components/schemas/userProfile"
                  - $ref: "#/components/schemas/travellingAsset"
            links:
              type: array
              items:
                $ref: "#/components/schemas/link"

    offer:
      type: object
      x-tm: SALES OFFER PACKAGE
      properties:
        id:
          $ref: "#/components/schemas/shortString"
        type:
          type: string
          pattern: "^(offer)$"
        properties:
          type: object
          properties:
            legs:
              type: array
              items:
                $ref: "#/components/schemas/leg"
            ancillaries:
              type: array
              items:
                $ref: "#/components/schemas/ancillary"
            products:
              type: array
              items:
                $ref: "#/components/schemas/product"
            price:
              $ref: "#/components/schemas/amountOfMoney"
            summary:
              type: object
              additionalProperties: true
            guarantees:
              type: array
              items:
                $ref: "#/components/schemas/guarantee"
            expiryTime:
              $ref: "#/components/schemas/dateTime"
        links:
          type: array
          items:
            $ref: "#/components/schemas/link"

    leg:
      x-tm: LEG
      allOf:
        - $ref: "#/components/schemas/travelSpecification"
        - type: object
          description: A (planned) consumption of a product within a package
          required:
            - id
            - type
          properties:
            id:
              $ref: "#/components/schemas/legReference"
              description:
                The unique identifier (TO) of this leg. Must always the same as applied in the request URL.
                And when there are not additional legs in the offered or purchased package, the same **id** as the package id.
            type:
              type: string
              pattern: "^(leg)$"
            sequenceNumber:
              $ref: "#/components/schemas/shortInt"
              description: The order of the leg within the package. Mandatory, if there are multiple legs in the package. If there are parallel legs (eg. using parking lot and a renting a bike), it can be the same within one package.
            traveller:
              $ref: "#/components/schemas/travellerReference"
            state:
              $ref: "#/components/schemas/legState"
            price:
              $ref: "#/components/schemas/amountOfMoney"
              description: the final price of the leg
            products:
              type: array
              items:
                $ref: "#/components/schemas/shortString"
              description: a reference to a product in the 'products' collection of the offer
            ancillaries:
              type: array
              items:
                $ref: "#/components/schemas/shortString"
